<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo De Animes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
        
        <h1 class="title">Catalogo De Animes</h1>

      
        <div class="new-task-container">
        <input class="new-task-input" type="text" placeholder="Digite o nome do anime" />
        <button class="new-task-button">Buscar</button> 
      </div>

      <div class="tasks-container"></div>

      <div class="historico-section">
        <div class="historico-header">
          <h2 class="historico-titulo">🕒 Histórico de Pesquisas</h2>
          <button class="limpar-historico-btn" id="limparHistoricoBtn">Limpar tudo</button>
        </div>
        <ul class="historico-lista" id="historicoLista">
          <li class="historico-vazio">Nenhuma pesquisa ainda.</li>
        </ul>
      </div>
    </div>

    <script
      src="https://kit.fontawesome.com/f9e19193d6.js" crossorigin="anonymous"></script>
    <script src="./scripts.js"></script>
  </body>
</html>
